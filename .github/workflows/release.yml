name: Release

# Changesets-driven release. On every push to main:
#   - if there are pending changesets, the action opens/updates a
#     "Version Packages" PR that bumps versions (lockstep — see
#     .changeset/config.json `fixed`) and writes CHANGELOGs.
#   - if there are NO pending changesets (i.e. that PR was just merged),
#     the action runs `pnpm release` (changeset publish), publishing any
#     package whose version is not yet on the registry.
# Versions live in git (the Version PR commits them); there is no
# tag-stamping step and no dirty-tree publish.
on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish (Changesets)
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the Version Packages PR + push tags
      pull-requests: write # open/update the Version Packages PR
      # OIDC trusted publishing: the id-token authenticates the publish
      # itself (no npm token anywhere) AND is what the registry consumes
      # to attach a signed provenance attestation linking the tarball to
      # this exact commit. Each package's Trusted Publisher on npmjs.com
      # is pinned to this repo + this workflow file.
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          # NO registry-url here. It writes an .npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}`, and with no token in the
          # OIDC world that env var is UNSET — npm's config parser then
          # errors on every registry read, changesets concludes nothing
          # is published, and every no-changeset push tries to republish
          # the current version (EPUBLISHCONFLICT). Trusted publishing
          # needs no .npmrc: npm >= 11.5.1 + id-token, default registry.

      # Trusted publishing (OIDC) needs npm >= 11.5.1; the npm bundled
      # with setup-node's Node 22 is older. Upgrade before any publish.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Build + pack-verify up front so a publish (which the action runs
      # only when no changesets remain) ships correct, complete tarballs.
      - run: pnpm build

      - name: Verify pack contents
        run: pnpm verify-pack

      - name: Create Version PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          # Sign off the auto-generated version commit so it clears the DCO
          # check like every other commit (Dependabot already signs its own).
          commit: |
            chore: version packages

            Signed-off-by: Andrew Jon Przybilla <andrewjon@efficacious.io>
          title: 'chore: version packages'
          # The suite versions in lockstep, so a release is ONE event —
          # we cut a single v<version> GitHub release below instead of
          # five per-package ones (four of which would be empty).
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No npm token: publishing authenticates via OIDC trusted
          # publishing (id-token above). Provenance is automatic under
          # OIDC; the explicit flag is kept as belt-and-braces.
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Create suite release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=$(node -p "require('./packages/csuite/package.json').version")
          if gh release view "v$V" >/dev/null 2>&1; then
            echo "release v$V already exists — skipping"
            exit 0
          fi
          node scripts/aggregate-changelog.mjs --extract "$V" > /tmp/suite-release-notes.md
          gh release create "v$V" \
            --title "CommandSuite v$V" \
            --notes-file /tmp/suite-release-notes.md
          echo "created release v$V"
