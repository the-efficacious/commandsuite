name: DCO

# Verifies every non-merge commit in a PR carries a Developer Certificate of
# Origin sign-off (`Signed-off-by:` trailer). Self-contained — no GitHub App
# to install. See CONTRIBUTING.md for the DCO policy and how to sign off.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: dco-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: Verify Signed-off-by
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0

      - name: Check DCO sign-off on all commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            if ! git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha" | grep -q .; then
              echo "::error::Missing 'Signed-off-by' on commit $(git show -s --format='%h %s' "$sha")"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "One or more commits are missing a DCO sign-off."
            echo "Fix a single commit:  git commit --amend --signoff --no-edit"
            echo "Fix a branch:         git rebase --signoff main"
            echo "Then:                 git push --force-with-lease"
            exit 1
          fi
          echo "All commits are signed off."
