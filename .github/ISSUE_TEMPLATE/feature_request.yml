name: Feature request
description: Suggest a new capability or change to existing behavior.
title: "[feat] <short description>"
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Before filing: for anything non-trivial, please open a
        [discussion](https://github.com/the-efficacious/commandsuite/discussions) first
        so we can align on shape before you (or anyone else) writes
        code. A good feature request is a problem description plus a
        proposed fit; not a solution in search of a problem.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution. Who hits this, how often, what do they currently do instead?
      placeholder: "As a director managing 10+ agents, I can't tell at a glance which ones are blocked on approvals ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should CommandSuite do? Be specific — commands, APIs, UI surfaces, data model changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them. "None" is a valid answer if you genuinely haven't seen another way.

  - type: dropdown
    id: component
    attributes:
      label: Which component?
      options:
        - broker (csuite-server)
        - CLI (csuite-cli)
        - web UI (csuite-web-host)
        - SDK (csuite-sdk)
        - core (csuite-core)
        - docs
        - cross-cutting
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      description: Check all that apply.
      options:
        - label: I'd be willing to help implement this
        - label: I've searched existing issues and discussions for similar requests
        - label: This is a breaking change
        - label: This requires a wire-protocol change (SDK bump)
